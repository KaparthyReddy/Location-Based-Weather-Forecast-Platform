<!DOCTYPE html>
<html>
<head>
    <title>Conditions | {{ weather_info.city }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='weather_details.css') }}">
</head>
<body>
    <div class="weather-card">
        <div class="city">{{ weather_info.city }}</div>
        <div style="font-size: 0.9rem; opacity: 0.7; margin-bottom: 15px;">
            {{ weather_info.region }}, {{ weather_info.country }}
        </div>
        <img src="{{ weather_info.icon_url }}" alt="Condition" style="width: 80px;">
        <div class="temp">{{ weather_info.temperature }}{{ weather_info.unit_label }}</div>
        <div class="desc">{{ weather_info.description }}</div>
        <a href="/" class="back-btn">← New Search</a>
    </div>
</body>
</html>
