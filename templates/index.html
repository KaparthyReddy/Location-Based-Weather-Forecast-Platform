<!DOCTYPE html>
<html>
<head>
    <title>SkyCast Engine</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="content">
        <h1>SkyCast</h1>
        <form action="/weather_details" method="get">
            <div style="display: flex; gap: 5px; margin-bottom: 10px;">
                <input type="text" id="cityInput" name="city" list="suggestions" placeholder="City" autocomplete="off" required>
                <button type="button" id="locationBtn" style="width: 50px; margin: 0; padding: 0;">📍</button>
            </div>
            <datalist id="suggestions"></datalist>
            <input type="text" id="stateInput" name="state" placeholder="State/Region">
            <input type="text" id="countryInput" name="country" placeholder="Country">
            <select name="unit">
                <option value="metric">Celsius (°C)</option>
                <option value="imperial">Fahrenheit (°F)</option>
            </select>
            <button type="submit">Analyze Conditions</button>
        </form>
    </div>

    <script>
        const cityInput = document.getElementById('cityInput');
        const suggestions = document.getElementById('suggestions');
        const stateInput = document.getElementById('stateInput');
        const countryInput = document.getElementById('countryInput');

        cityInput.addEventListener('input', async (e) => {
            const val = e.target.value;
            if (val.includes(',')) {
                const parts = val.split(',');
                if (parts.length >= 3) {
                    cityInput.value = parts[0].trim();
                    stateInput.value = parts[1].trim();
                    countryInput.value = parts[2].trim();
                    return;
                }
            }
            if (val.length < 2) return;
            const res = await fetch(`/search_suggest?q=${val}`);
            const data = await res.json();
            suggestions.innerHTML = '';
            data.forEach(item => {
                const opt = document.createElement('option');
                opt.value = `${item.name}, ${item.region}, ${item.country}`;
                suggestions.appendChild(opt);
            });
        });

        document.getElementById('locationBtn').addEventListener('click', () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const q = `${pos.coords.latitude},${pos.coords.longitude}`;
                    const res = await fetch(`/search_suggest?q=${q}`);
                    const data = await res.json();
                    if (data.length > 0) {
                        cityInput.value = data[0].name;
                        stateInput.value = data[0].region;
                        countryInput.value = data[0].country;
                    }
                });
            }
        });
    </script>
</body>
</html>
